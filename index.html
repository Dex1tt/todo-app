<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus - Все задачи на своём месте</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Мои задачи</h1>

        <div class="input-row">
            <input id="task-input" placeholder="Новая задача...">
            <button id="add-btn">+ Добавить</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="done">Выполненные</button>
        </div>

        <p class="counter" id="counter"></p>
        <button id="clear-done">Очистить выполненные</button>
        <ul id="task-list"></ul>
        <p id="empty-msg" class="empty">Задач пока нет</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
